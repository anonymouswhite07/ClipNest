<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - ClipNest</title>
    <link rel="stylesheet" href="/style.css?v=1.3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .error-container {
            background: rgba(24, 24, 27, 0.6);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            backdrop-filter: blur(12px);
            padding: 3rem;
            max-width: 500px;
            animation: slide-up 0.4s ease-out;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            line-height: 1;
        }
        .error-msg {
            color: var(--muted-foreground);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="app-bg"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="error-container">
        <div class="error-code">404</div>
        <h2>Lost in the Nest?</h2>
        <p class="error-msg">The page you are looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn-primary" style="text-decoration: none; display: inline-flex;">
            <i class="fa-solid fa-house"></i>
            <span>Back to Home</span>
        </a>
    </div>
</body>
</html>
